  displayName: "成员管理"
  description: "成员管理模块，支持访客提交成员信息，管理员审核和分组展示。"
  license:
    - name: "GPL-3.0"
  configMapName: plugin-members-configmap
  settingName: plugin-members-settings
  enabled: true
