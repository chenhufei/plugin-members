apiVersion: plugin.halo.run/v1alpha1
kind: Plugin
metadata:
  name: PluginMembers
spec:
  version: 1.0.1
  requires: ">=2.23.0"
  author:
    name: chenhufei
    website: https://github.com/chenhufei
  logo: logo.svg
  homepage: https://github.com/chenhufei/plugin-members
  repo: https://github.com/chenhufei/plugin-members
